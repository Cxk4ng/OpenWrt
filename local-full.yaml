# 规则配置
rules:
  # 局域网及本地规则 (最高优先级)
  - DOMAIN-SUFFIX,localhost,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - RULE-SET,LAN,🚩 国内直连
  - RULE-SET,ProxyWhitelist,🚩 国内直连
  
  # 国内域名&IP直连
  - GEOSITE,CN,DIRECT
  - GEOIP,CN,DIRECT

  # 人工智能
  - RULE-SET,OpenAI,🧠 ChatGPT
  - RULE-SET,Gemini,🌟 Gemini
  - RULE-SET,Claude,☕ Claude
  - RULE-SET,Copilot,👀 Copilot

  # 社交应用
  - RULE-SET,Telegram,✈️ Telegram
  - RULE-SET,Twitter,🕊️ Twitter
  - RULE-SET,TikTok,💃 TikTok
  - RULE-SET,Reddit,🤖 Reddit

  # 国外媒体
  - RULE-SET,YouTube,🎬 YouTube
  - RULE-SET,Netflix,📽️ Netflix
  - RULE-SET,Disney,🏰 Disney
  - RULE-SET,Spotify,🎵 Spotify
  - RULE-SET,PrimeVideo,▶️ PrimeVideo
  - RULE-SET,Bahamut,👘 Bahamut
  
  # 国外网站
  - RULE-SET,Wikimedia,📚 Wikimedia

  # 游戏平台
  - RULE-SET,Epic,🎮 Gaming
  - RULE-SET,Xbox,🎮 Gaming
  - RULE-SET,Steam,🎮 Gaming
  - RULE-SET,Nintendo,🎮 Gaming
  - RULE-SET,PlayStation,🎮 Gaming

  # Apple服务
  - RULE-SET,iCloud,🍎 Apple
  - RULE-SET,AppStore,🍎 Apple
  - RULE-SET,AppleTV,🍎 Apple

  # 非大陆域名走代理
  - GEOSITE,geolocation-!cn,🐟 国外代理

  # 未匹配到直连
  - MATCH,DIRECT                  