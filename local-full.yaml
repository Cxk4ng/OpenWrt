  '(韩国|KR|Korea|KOR)'

JP: &JP
  '(日本|JP|Japan|Tokyo)'

SG: &SG
  '(狮城|新加坡|SG|Singapore)'

US: &US
  '(美国|US|United States|Seattle)'

CA: &CA
  '(加拿大|CA|Canada)'

Asia: &AS
  '(澳门|朝鲜|印度|印度尼西亚|印尼|土耳其|伊朗|泰国|巴基斯坦|菲律宾|马来西亚|越南|缅甸|柬埔寨|迪拜|以色列|阿联酋|India)'

Europe: &EU
  '(俄罗斯|德国|土耳其|法国|英国|意大利|西班牙|乌克兰|波兰|荷兰|葡萄牙|比利时|爱尔兰|匈牙利|摩尔多瓦|German|French|United Kingdom|London|Russia|Moscow)'

America: &AM
  '(巴西|墨西哥|哥伦比亚|阿根廷|秘鲁|委内瑞拉|智利|厄瓜多尔|玻利维亚)'

Oceania: &OC
  '(澳大利亚|巴布亚新几内亚|新西兰|新喀里多尼亚|斐济|悉尼|Australia)'

Africa: &AF
  '(南非|埃及|尼日利亚|South Africa|Egypt)'


# 代理模板
Auto: &Auto
  type: url-test          # 策略组类型: 自动
  url: 'https://www.gstatic.com/generate_204'
  expected-status: 204    # 期望状态码: 204
  interval: 300           # 测速间隔: 5min
  timeout: 5000           # 超时时间: 5s
  lazy: true              # 懒加载模式
  tolerance: 5            # 容差值: 5ms
  disable-udp: false      # 禁用UDP开关 (允许udp通过)
  hidden: false           # 隐藏开关 (界面可见)
  include-all: true       # 包含所有节点

Select: &Select
  type: select            # 策略组类型: 手动
  disable-udp: false      # 禁用UDP开关:
  hidden: false           # 隐藏开关 (false表示界面可见)
  include-all: true       # 包含所有节点


