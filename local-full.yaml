#Clash.Meta(mihomo)
MetaCfg: &MetaCfg
    interval: 43200                                     # 更新频率: 12h
    health-check:
        enable: true
        url: 'https://www.gstatic.com/generate_204'     # 测速链接
        interval: 300                                   # 测速间隔: 5min
        timeout: 5000                                   # 超时时间: 5s
        lazy: true
        expected-status: 204                            # 期望状态码: 204


# 机场订阅
proxy-providers:
  provider:                                  # 节点集名
    url: 'Subscription'                      # 订阅地址
    type: http                               # 请求协议
    <<: *MetaCfg                             # 引用测速模板
    path: './proxy_provider/provider.yaml'   # 缓存路径
    proxy: 🐟 国外代理                        # 代理
    filter: '^(?!.*(?i)(?:NEVER_MATCH)).*$'  # 过滤正则


# 全局配置
mixed-port: 7890            # 混合端口
socks-port: 0               # SOCKS5端口 (0表示流量从mixed-port出去)
port: 0                     # HTTP端口
redir-port: 0               # 透明代理端口
tproxy-port: 0              # TProxy端口
mode: rule                  # 运行模式 (rule,global,direct)
log-level: info             # 日志级别 (silent,error,warn,info,debug)
ipv6: true                  # ipv6开关 (是否处理ipv6流量)
find-process-mode: always   # 进程匹配模式
authentication: []          # 身份验证 (空表示无密码即可连接)
skip-auth-prefixes:         # 跳过验证前缀
  - 127.0.0.1/32
  - ::1/128
allow-lan: true             # 允许局域网
lan-disallowed-ips: []      # 局域网禁止IP
bind-address: "*"           # 绑定监听地址
lan-allowed-ips:            # 局域网允许IP
  - 0.0.0.0/0
  - ::/0


# 控制面板
external-controller: 0.0.0.0:7891       # 外部控制台端口
external-ui: ui                         # 本地 UI 文件夹名称
secret: ""                              # 控制面板密码
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip' # 自动下载面板的地址
external-controller-cors:               # 跨域设置
  allow-origins: ["*"]
  allow-private-network: true           # 允许私有网络访问
profile:
  store-selected: true                  # 记忆功能 (重启后自动选择上次选择节点)
  store-fake-ip: true                   # 记忆Fake-IP (重启后保持IP映射表)
unified-delay: true                     # 统一延迟 (计算延迟时包含握手时间)
tcp-concurrent: true                    # TCP并发请求测速
global-client-fingerprint: chrome       # 浏览器指纹
geodata-mode: true                      # 开启 GeoData 模式
geo-auto-update: false                  # 是否自动更新数据库
geo-update-interval: 24                 # 更新间隔（单位：小时）
geox-url:                               # 数据库下载地址
  geoip: 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat'
  geosite: 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat'
  mmdb: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb'
  asn: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb'


# TUN配置
tun:                                    # 虚拟网卡配置
  enable: false                         # 是否开启TUN模式
  stack: mixed                          # 协议栈方案：混合模式
  device: Clash.Meta                    # 虚拟网卡名字
  auto-route: true                      # 自动设置路由 (自动将系统流量引流到这块虚拟网卡)
  auto-redirect: true                   # 自动重定向
  auto-detect-interface: true           # 自动检测出口网卡 (防止流量环路)
  dns-hijack:                           # DNS劫持
    - any:53
    - tcp://any:53
  strict-route: true                    # 严格路由模式 (强制所有流量通过 TUN)
  mtu: 1500                             # 最大传输单元
  route-exclude-address: []             # 路由排除列表


# DNS配置
dns:
  enable: true                          # 开启Clash内部DNS服务器 (务必开启否则无法分流)
  cache-algorithm: arc                  # 使用ARC缓存算法 (抗污染能力强 命中率高)
  ipv6: true                            # 开启IPv6解析
  enhanced-mode: fake-ip                # 增强模式：Fake-IP (先返回假ip请求 后台解析真实ip在发送前掉包)
  fake-ip-range: 198.18.0.1/15          # Fake-IP白名单
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - localhost.ptlogin2.qq.com
  nameserver:                           # 并发解析以下dns服务
  - 223.5.5.5
  - 119.29.29.29
  - 1.1.1.1
  - 8.8.8.8
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  - https://dns.google/dns-query
  fallback-filter:
    geoip: false
    ipcidr:
    - 240.0.0.0/4


# 流量嗅探
sniffer:                                # 用来配合 Fake-IP 还原被隐藏的真实域名
  enable: true                          # 开启嗅探功能 (Fake-IP模式必开)
  sniff:
    HTTP:                               # 针对 HTTP 协议的嗅探
      ports:
        - 80
        - 8080-8880
    TLS:                                # 针对 TLS（HTTPS）协议的嗅探
      ports:
        - 443
        - 8443
    QUIC:                               # 针对 QUIC 协议的嗅探
      ports:
        - 443
        - 8443


# 节点过滤
HK: &HK
  '(香港|HK|Hong Kong|Hongkong)'

TW: &TW
  '(台湾|TW|Taiwan)'

